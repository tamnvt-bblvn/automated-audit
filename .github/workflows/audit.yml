name: App Links Audit Bot

on:
  schedule:
    # Runs every 15 minutes (Format: Minute Hour Day Month Day-of-week)
    # Note: GitHub Actions schedule can be delayed by 5-30 mins depending on server load.
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  run-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Create Credentials File
        # Reconstructs credentials.json from GitHub Repository Secrets
        # Ensure GOOGLE_CREDENTIALS_JSON is added in Settings > Secrets > Actions
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > src/credentials.json

      - name: Run Audit Script
        # Executes the main logic and triggers Discord alerts if issues are found
        run: node src/index.js
        env:
          # Injects Discord Webhook from Secrets into Environment Variables
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
